<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NBP Exchange Rates</title>
  <link rel="stylesheet" href="tailwind.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-200">
  <div class="w-full p-4 flex flex-col items-center">
    <div class="w-full flex justify-between items-center mb-4">
      <h2 class="text-xl font-bold tracking-tight text-slate-800 dark:text-slate-100 m-0">NBP Exchange Rates</h2>
      <button id="themeToggle" class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" aria-label="Toggle Dark Mode">
        <!-- Sun icon -->
        <svg id="themeToggleLightIcon" class="hidden w-5 h-5 text-yellow-500" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 2.22a1 1 0 011.415 0l.708.707a1 1 0 01-1.415 1.415l-.708-.707a1 1 0 010-1.415zM17 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zm-2.22 4.22a1 1 0 010 1.415l-.707.708a1 1 0 01-1.415-1.415l.707-.708a1 1 0 011.415 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-2.22a1 1 0 010-1.415l-.708-.707a1 1 0 011.415-1.415l.708.707a1 1 0 01-1.415 1.415zM4 10a1 1 0 01-1 1H2a1 1 0 110-2h1a1 1 0 011 1zm2.22-4.22a1 1 0 011.415-1.415l.707.708a1 1 0 01-1.415 1.415l-.707-.708a1 1 0 010-1.415zM10 5a5 5 0 100 10 5 5 0 000-10z"></path>
        </svg>
        <!-- Moon icon -->
        <svg id="themeToggleDarkIcon" class="hidden w-5 h-5 text-slate-700 dark:text-slate-300" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
        </svg>
      </button>
    </div>
    <div class="w-full flex flex-col gap-3">
      <div class="flex flex-col">
        <label for="rateType" class="text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Type:</label>
        <select id="rateType" class="block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm bg-white dark:bg-slate-800 dark:border-slate-600 dark:text-slate-200 py-2 px-3 border outline-none transition-colors">
          <option value="A">Table A</option>
          <option value="B">Table B</option>
          <option value="C">Table C</option>
          <option value="single">Single Currency</option>
        </select>
      </div>
      <div id="currencySelect" class="flex flex-col" style="display:none;">
        <label for="currency" class="text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Currency Code:</label>
        <select id="currency" class="block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm bg-white dark:bg-slate-800 dark:border-slate-600 dark:text-slate-200 py-2 px-3 border outline-none transition-colors">
          <option value="AUD">🇦🇺 AUD - Australian Dollar</option>
          <option value="BGN">🇧🇬 BGN - Bulgarian Lev</option>
          <option value="BRL">🇧🇷 BRL - Brazilian Real</option>
          <option value="CAD">🇨🇦 CAD - Canadian Dollar</option>
          <option value="CHF">🇨🇭 CHF - Swiss Franc</option>
          <option value="CLP">🇨🇱 CLP - Chilean Peso</option>
          <option value="CNY">🇨🇳 CNY - Chinese Yuan Renminbi</option>
          <option value="CZK">🇨🇿 CZK - Czech Koruna</option>
          <option value="DKK">🇩🇰 DKK - Danish Krone</option>
          <option value="EUR">🇪🇺 EUR - Euro</option>
          <option value="GBP">🇬🇧 GBP - British Pound Sterling</option>
          <option value="HKD">🇭🇰 HKD - Hong Kong Dollar</option>
          <option value="HUF">🇭🇺 HUF - Hungarian Forint</option>
          <option value="IDR">🇮🇩 IDR - Indonesian Rupiah</option>
          <option value="ILS">🇮🇱 ILS - Israeli New Shekel</option>
          <option value="INR">🇮🇳 INR - Indian Rupee</option>
          <option value="ISK">🇮🇸 ISK - Icelandic Krona</option>
          <option value="JPY">🇯🇵 JPY - Japanese Yen</option>
          <option value="KRW">🇰🇷 KRW - South Korean Won</option>
          <option value="MXN">🇲🇽 MXN - Mexican Peso</option>
          <option value="MYR">🇲🇾 MYR - Malaysian Ringgit</option>
          <option value="NOK">🇳🇴 NOK - Norwegian Krone</option>
          <option value="NZD">🇳🇿 NZD - New Zealand Dollar</option>
          <option value="PHP">🇵🇭 PHP - Philippine Peso</option>
          <option value="RON">🇷🇴 RON - Romanian Leu</option>
          <option value="RUB">🇷🇺 RUB - Russian Ruble</option>
          <option value="SEK">🇸🇪 SEK - Swedish Krona</option>
          <option value="SGD">🇸🇬 SGD - Singapore Dollar</option>
          <option value="THB">🇹🇭 THB - Thai Baht</option>
          <option value="TRY">🇹🇷 TRY - Turkish Lira</option>
          <option value="UAH">🇺🇦 UAH - Ukrainian Hryvnia</option>
          <option value="USD">🇺🇸 USD - US Dollar</option>
          <option value="ZAR">🇿🇦 ZAR - South African Rand</option>
        </select>
      </div>
      <div class="flex flex-col">
        <label for="date" class="text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Date:</label>
        <input type="date" id="date" class="block w-full rounded-md border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm bg-white dark:bg-slate-800 dark:border-slate-600 dark:text-slate-200 py-2 px-3 border outline-none transition-colors" />
      </div>
      <button id="fetchBtn" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors mt-2">
        Fetch Rates
      </button>
    </div>

    <div id="resultContainer" class="w-full mt-6 flex justify-center">
      <div id="result" class="w-full text-center text-slate-500 dark:text-slate-400 text-sm">Select parameters and click Fetch Rates.</div>
    </div>
    <script src="popup.js"></script>
  </div>
</body>
</html>
